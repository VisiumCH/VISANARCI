name: Release

on:
  push:
    tags:
      - "v*"

defaults:
  run:
    shell: bash

env:
  FORCE_COLOR: 1

jobs:
  build:
    uses: ./.github/workflows/build.yml
    with:
      regenerate-artifacts: false

  release:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: testpypi
      url: "https://test.pypi.org/p/visanarci"

    permissions:
      id-token: write
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"

      - name: Check tag matches package version
        run: |
          VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          TAG=${GITHUB_REF_NAME#v}
          test "$VERSION" = "$TAG" || (echo "Tag $TAG != pyproject version $VERSION" && exit 1)

      - uses: actions/download-artifact@v7
        with:
          name: dist
          path: dist
          merge-multiple: true

      - name: Check package metadata
        run: |
          python -m pip install --upgrade twine
          twine check dist/*

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          verbose: true

      - id: prerelease-check
        run: |
          regex='((a|b|rc)([[:digit:]]+\.post)?|\.dev)[[:digit:]]+$'

          if grep -E "$regex" <<<"$GITHUB_REF_NAME"; then
            echo prerelease=true >> $GITHUB_OUTPUT
          else
            echo prerelease=false >> $GITHUB_OUTPUT
          fi

      - uses: softprops/action-gh-release@v2
        with:
          files: "dist/*"
          fail_on_unmatched_files: true
          generate_release_notes: true
          prerelease: ${{ steps.prerelease-check.outputs.prerelease == 'true' }}
